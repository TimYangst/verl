# Target class for this configuration
_target_: verl.workers.config.VeOmniEngineConfig

# Whether to offload model parameters to CPU
param_offload: False

# Whether to offload optimizer state to CPU
optimizer_offload: False

# FSDP group size. -1 means use all available GPUs.
fsdp_size: -1

ulysses_parallel_size: 1

expert_parallel_size: 1

mixed_precision: true

# Random seed for reproducibility.
seed: 42

# Whether to enable full determinism for distributed training, only for debugging.
full_determinism: false

init_device: meta

enable_full_shard: true

ckpt_manager: dcp

# Only for FSDP1: FSDP1 configuration, prefetch the next forward-pass all-gather
# before the current forward computation.
forward_prefetch: true

strategy: veomni

# Whether to use torch compile in fsdp.
use_torch_compile: false

# Whether to use forward only in fsdp.
forward_only: false

enable_fsdp_offload: false

enable_reentrant: false

# support eager, sdpa, flash_attention_2, flash_attention_3, veomni_flash_attention_2_with_sp,
# veomni_flash_attention_3_with_sp and native-sparse
attn_implementation: flash_attention_2

# MoE experts forward kernel. GPU default = fused_triton (Triton group-gemm,
# SM70+); SM90+ may use fused_quack; on Ascend NPU override to fused_npu.
# `fused` (the legacy name) was removed in VeOmni's kernel-selection refactor —
# `apply_veomni_fused_moe_patch` raises ValueError if it sees that string now.
moe_implementation: fused_triton

# Cross-entropy loss kernel, installed via VeOmni's apply_ops_config()
# singleton path. GPU default = liger_kernel (fused linear+CE, requires
# liger-kernel); on NPU override to `npu` (chunked loss); `eager` materializes
# the full [bsz × seq × vocab] logits tensor and OOMs at loss.backward() for
# large-vocab MoE models.
cross_entropy_loss_implementation: liger_kernel

force_use_huggingface: false

activation_gpu_limit: 0.0
